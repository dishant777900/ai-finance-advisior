<!DOCTYPE html>
<html>
<head>
    <title>AI Finance Advisor</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        .chat-box {
            background: white;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .user {
            text-align: right;
            margin: 10px;
        }

        .ai {
            text-align: left;
            margin: 10px;
        }

        .bubble {
            display: inline-block;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user .bubble {
            background: #d1e7dd;
        }

        .ai .bubble {
            background: #f8d7da;
        }

        input {
            width: 75%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💰 AI Finance Advisor</h2>

    <div id="chat" class="chat-box"></div>

    <input id="input" type="text" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let userText = input.value;
    if (!userText) return;

    // Show user message
    chat.innerHTML += `
        <div class="user">
            <div class="bubble">${userText}</div>
        </div>
    `;

    // Call backend
    let res = await fetch(`http://127.0.0.1:8000/ask?query=${userText}`);
    let data = await res.json();

    let aiText = data.response.replace(/\n/g, "<br>");

    // Show AI response
    chat.innerHTML += `
        <div class="ai">
            <div class="bubble">${aiText}</div>
        </div>
    `;

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
